services:
  - type: web
    name: watsaap-broadcast
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: API_KEY
        generateValue: true
      - key: NODE_VERSION
        value: 20.x
